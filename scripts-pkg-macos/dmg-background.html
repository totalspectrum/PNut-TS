<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 500px;
            height: 300px;
            background: linear-gradient(135deg, #1e3a5f 0%, #0d1f33 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle pattern overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                repeating-linear-gradient(45deg,
                    transparent,
                    transparent 35px,
                    rgba(255,255,255,0.02) 35px,
                    rgba(255,255,255,0.02) 70px);
            pointer-events: none;
        }

        .arrow {
            width: 100px;
            height: 60px;
            position: relative;
        }

        .arrow-line {
            position: absolute;
            top: 50%;
            left: 10px;
            width: 60px;
            height: 4px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 2px;
            transform: translateY(-50%);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .arrow-head {
            position: absolute;
            top: 50%;
            right: 10px;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 12px 0 12px 20px;
            border-color: transparent transparent transparent rgba(255, 255, 255, 0.9);
            transform: translateY(-50%);
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.2));
        }

        .instruction {
            position: absolute;
            bottom: 40px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }

        .app-name {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff6b35;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }

        .subtitle {
            position: absolute;
            top: 62px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            font-weight: 500;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }

        .company {
            position: absolute;
            top: 82px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            font-weight: 400;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="app-name">PNut-TS</div>
    <div class="subtitle">Propeller 2 Spin2/PASM2 Compiler</div>
    <div class="company">Iron Sheep Productions, LLC</div>

    <div class="arrow">
        <div class="arrow-line"></div>
        <div class="arrow-head"></div>
    </div>

    <div class="instruction">Drag to Applications Folder to Install</div>
</body>
</html>
