name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip release creation)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  NODE_VERSION: '22'

jobs:
  # Build all platform binaries
  build:
    name: Build Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Package version: ${VERSION}"

      - name: Validate tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="${{ steps.version.outputs.VERSION }}"

          # Extract base version (strip -testN, -rcN, -beta, -alpha suffixes)
          BASE_TAG_VERSION=$(echo "$TAG_VERSION" | sed -E 's/-(test|rc|beta|alpha)[0-9]*$//')

          echo "Tag version:      ${TAG_VERSION}"
          echo "Base tag version: ${BASE_TAG_VERSION}"
          echo "Package version:  ${PKG_VERSION}"

          if [ "$BASE_TAG_VERSION" != "$PKG_VERSION" ]; then
            echo ""
            echo "ERROR: Tag base version (${BASE_TAG_VERSION}) does not match package.json (${PKG_VERSION})"
            exit 1
          fi

          # Check if this is a test/pre-release
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo ""
            echo "NOTE: This is a pre-release build (${TAG_VERSION})"
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Bundle with esbuild
        run: npm run esbuild

      - name: Run tests
        run: npm test

      - name: Build standalone executables with pkg
        run: |
          # Use @yao-pkg/pkg for Node.js 22 support
          npx @yao-pkg/pkg . --out-path pkgs

          echo "Built packages:"
          ls -la pkgs/

      - name: Prepare package contents
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Executable naming convention:
          #   Primary executable: pnut-ts (hyphenated, matches project name)
          #   Compatibility alias: pnut_ts (underscored, for backward compatibility)
          #   - On Unix: symlink pnut_ts -> pnut-ts
          #   - On Windows: copy pnut-ts.exe to pnut_ts.exe (symlinks require admin)

          # Create package directories for each platform
          for platform in win-x64 win-arm64 linux-x64 linux-arm64 macos-x64 macos-arm64; do
            mkdir -p "packages/pnut-ts-${platform}-${VERSION}/pnut_ts"

            # Copy documentation files
            cp README.md "packages/pnut-ts-${platform}-${VERSION}/pnut_ts/"
            cp LICENSE.txt "packages/pnut-ts-${platform}-${VERSION}/pnut_ts/" 2>/dev/null || cp LICENSE "packages/pnut-ts-${platform}-${VERSION}/pnut_ts/LICENSE.txt" 2>/dev/null || echo "No LICENSE file found"
            cp CHANGELOG.md "packages/pnut-ts-${platform}-${VERSION}/pnut_ts/" 2>/dev/null || true

            # Copy binary with correct name and create compatibility alias
            # Note: pkg produces files named "p2-pnut-ts-*" based on package.json name
            if [[ "$platform" == win-* ]]; then
              # Windows: copy as pnut-ts.exe (primary) and pnut_ts.exe (compat copy)
              cp "pkgs/p2-pnut-ts-${platform}.exe" "packages/pnut-ts-${platform}-${VERSION}/pnut_ts/pnut-ts.exe"
              cp "packages/pnut-ts-${platform}-${VERSION}/pnut_ts/pnut-ts.exe" "packages/pnut-ts-${platform}-${VERSION}/pnut_ts/pnut_ts.exe"
            else
              # Unix: copy as pnut-ts (primary) and symlink pnut_ts -> pnut-ts (compat)
              cp "pkgs/p2-pnut-ts-${platform}" "packages/pnut-ts-${platform}-${VERSION}/pnut_ts/pnut-ts"
              chmod +x "packages/pnut-ts-${platform}-${VERSION}/pnut_ts/pnut-ts"
              ln -sf pnut-ts "packages/pnut-ts-${platform}-${VERSION}/pnut_ts/pnut_ts"
            fi
          done

          echo "Package contents created with pnut-ts (primary) and pnut_ts (compat alias)"

      - name: Create Windows/Linux ZIP packages
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cd packages

          for platform in win-x64 win-arm64 linux-x64 linux-arm64; do
            zip -r "../pnut-ts-${platform}-${VERSION}.zip" "pnut-ts-${platform}-${VERSION}"
            echo "Created: pnut-ts-${platform}-${VERSION}.zip"
          done

      - name: Upload Windows/Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-zip
          path: pnut-ts-*.zip
          retention-days: 5

      - name: Upload macOS x64 package directory
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-pkg
          path: packages/pnut-ts-macos-x64-*/
          retention-days: 1

      - name: Upload macOS arm64 package directory
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-pkg
          path: packages/pnut-ts-macos-arm64-*/
          retention-days: 1

      - name: Upload version info
        uses: actions/upload-artifact@v4
        with:
          name: version-info
          path: package.json
          retention-days: 1

  # Sign macOS binaries and create DMGs
  macos-sign:
    name: Sign & Package macOS
    runs-on: macos-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS x64 package
        uses: actions/download-artifact@v4
        with:
          name: macos-x64-pkg
          path: packages/

      - name: Download macOS arm64 package
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-pkg
          path: packages/

      - name: Download version info
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: .

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Install Python dependencies
        run: |
          # Use --break-system-packages for Homebrew-managed Python on macOS
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install Pillow --break-system-packages

      - name: List downloaded packages
        run: |
          echo "Package directories:"
          ls -la packages/
          echo ""
          echo "Contents:"
          find packages -type f

      - name: Restore executable permissions
        run: |
          # GitHub Actions artifacts don't preserve Unix permissions
          VERSION="${{ steps.version.outputs.VERSION }}"
          for arch in x64 arm64; do
            BINARY="packages/pnut-ts-macos-${arch}-${VERSION}/pnut_ts/pnut-ts"
            if [ -f "$BINARY" ]; then
              chmod +x "$BINARY"
              echo "Set executable: $BINARY"
            fi
          done

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
        run: |
          # Skip if no certificate configured
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "No signing certificate configured, skipping signing"
            echo "SIGNING_ENABLED=false" >> $GITHUB_ENV
            exit 0
          fi

          echo "SIGNING_ENABLED=true" >> $GITHUB_ENV

          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          echo "Certificate imported successfully"

      - name: Create entitlements.plist
        run: |
          cat > entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.allow-jit</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Sign macOS binaries
        if: env.SIGNING_ENABLED == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVELOPER_NAME: ${{ secrets.APPLE_DEVELOPER_NAME }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          for arch in x64 arm64; do
            # Sign the primary executable (pnut-ts)
            BINARY="packages/pnut-ts-macos-${arch}-${VERSION}/pnut_ts/pnut-ts"

            if [ -f "$BINARY" ]; then
              echo "Signing ${arch} binary (pnut-ts)..."

              codesign --force --sign "Developer ID Application: ${APPLE_DEVELOPER_NAME} (${APPLE_TEAM_ID})" \
                --options runtime \
                --timestamp \
                --entitlements entitlements.plist \
                "$BINARY"

              echo "Verifying signature..."
              codesign --verify --verbose=2 "$BINARY"
              echo "${arch} binary signed successfully"

              # Recreate symlink (signing may have affected it)
              SYMLINK="packages/pnut-ts-macos-${arch}-${VERSION}/pnut_ts/pnut_ts"
              rm -f "$SYMLINK"
              ln -sf pnut-ts "$SYMLINK"
              echo "Recreated compatibility symlink: pnut_ts -> pnut-ts"
            else
              echo "WARNING: Binary not found: $BINARY"
            fi
          done

      - name: Create transparency removal script
        run: |
          cat > remove_border_bg.py << 'PYTHON_SCRIPT'
          from PIL import Image
          from collections import deque
          import sys

          def remove_border_background(src_path, dst_path, threshold=240):
              img = Image.open(src_path).convert("RGBA")
              pixels = img.load()
              width, height = img.size
              to_transparent = set()
              visited = set()

              def flood_fill(start_x, start_y):
                  queue = deque([(start_x, start_y)])
                  while queue:
                      x, y = queue.popleft()
                      if (x, y) in visited or x < 0 or x >= width or y < 0 or y >= height:
                          continue
                      visited.add((x, y))
                      r, g, b, a = pixels[x, y]
                      if r >= threshold and g >= threshold and b >= threshold:
                          to_transparent.add((x, y))
                          queue.extend([(x+1, y), (x-1, y), (x, y+1), (x, y-1)])

              for x in range(width):
                  flood_fill(x, 0)
                  flood_fill(x, height-1)
              for y in range(height):
                  flood_fill(0, y)
                  flood_fill(width-1, y)

              for x, y in to_transparent:
                  r, g, b, a = pixels[x, y]
                  pixels[x, y] = (r, g, b, 0)

              img.save(dst_path, "PNG")
              print(f"Transparency added ({len(to_transparent)} pixels)")

          if __name__ == "__main__":
              remove_border_background(sys.argv[1], sys.argv[2])
          PYTHON_SCRIPT

      - name: Create icons with transparency
        run: |
          # Create volume icon ICNS with transparent background
          SOURCE_IMG=""
          if [ -f "scripts-pkg-macos/volume-icon.png" ]; then
            SOURCE_IMG="scripts-pkg-macos/volume-icon.png"
          elif [ -f "REF-INSTALL/Images/ISP-Disk-image.png" ]; then
            SOURCE_IMG="REF-INSTALL/Images/ISP-Disk-image.png"
          fi

          if [ -n "$SOURCE_IMG" ]; then
            echo "Creating volume icon ICNS from $SOURCE_IMG..."
            sips -s format png "$SOURCE_IMG" --out volume-icon-tmp.png >/dev/null 2>&1
            python3 remove_border_bg.py volume-icon-tmp.png volume-icon-transparent.png

            ICONSET_DIR="volume-icon.iconset"
            mkdir -p "$ICONSET_DIR"
            for size in 16 32 128 256 512; do
              sips -z $size $size volume-icon-transparent.png --out "${ICONSET_DIR}/icon_${size}x${size}.png" >/dev/null 2>&1
            done
            sips -z 32 32     volume-icon-transparent.png --out "${ICONSET_DIR}/icon_16x16@2x.png" >/dev/null 2>&1
            sips -z 64 64     volume-icon-transparent.png --out "${ICONSET_DIR}/icon_32x32@2x.png" >/dev/null 2>&1
            sips -z 256 256   volume-icon-transparent.png --out "${ICONSET_DIR}/icon_128x128@2x.png" >/dev/null 2>&1
            sips -z 512 512   volume-icon-transparent.png --out "${ICONSET_DIR}/icon_256x256@2x.png" >/dev/null 2>&1
            sips -z 1024 1024 volume-icon-transparent.png --out "${ICONSET_DIR}/icon_512x512@2x.png" >/dev/null 2>&1
            rm -f volume-icon-tmp.png volume-icon-transparent.png
            iconutil -c icns "$ICONSET_DIR"
            rm -rf "$ICONSET_DIR"
            echo "Created volume-icon.icns with transparency"
          fi

          # Create app icon ICNS similarly
          APP_SOURCE=""
          if [ -f "scripts-pkg-macos/app-icon.png" ]; then
            APP_SOURCE="scripts-pkg-macos/app-icon.png"
          elif [ -f "REF-INSTALL/Images/pmut-ts-appIcon-green.png" ]; then
            APP_SOURCE="REF-INSTALL/Images/pmut-ts-appIcon-green.png"
          fi

          if [ -n "$APP_SOURCE" ]; then
            echo "Creating app icon ICNS from $APP_SOURCE..."
            sips -s format png "$APP_SOURCE" --out app-icon-tmp.png >/dev/null 2>&1
            python3 remove_border_bg.py app-icon-tmp.png app-icon-transparent.png

            ICONSET_DIR="app-icon.iconset"
            mkdir -p "$ICONSET_DIR"
            for size in 16 32 128 256 512; do
              sips -z $size $size app-icon-transparent.png --out "${ICONSET_DIR}/icon_${size}x${size}.png" >/dev/null 2>&1
            done
            sips -z 32 32     app-icon-transparent.png --out "${ICONSET_DIR}/icon_16x16@2x.png" >/dev/null 2>&1
            sips -z 64 64     app-icon-transparent.png --out "${ICONSET_DIR}/icon_32x32@2x.png" >/dev/null 2>&1
            sips -z 256 256   app-icon-transparent.png --out "${ICONSET_DIR}/icon_128x128@2x.png" >/dev/null 2>&1
            sips -z 512 512   app-icon-transparent.png --out "${ICONSET_DIR}/icon_256x256@2x.png" >/dev/null 2>&1
            sips -z 1024 1024 app-icon-transparent.png --out "${ICONSET_DIR}/icon_512x512@2x.png" >/dev/null 2>&1
            rm -f app-icon-tmp.png app-icon-transparent.png
            iconutil -c icns "$ICONSET_DIR"
            rm -rf "$ICONSET_DIR"
            echo "Created app-icon.icns with transparency"
          fi

          rm -f remove_border_bg.py

      - name: Create DMG background
        run: |
          cat > create_dmg_bg.py << 'PYTHON_SCRIPT'
          from PIL import Image, ImageDraw, ImageFont
          import os

          width, height = 500, 300
          img = Image.new('RGB', (width, height), color='white')
          draw = ImageDraw.Draw(img)

          try:
              font_title = ImageFont.truetype("/System/Library/Fonts/Helvetica.ttc", 28)
              font_subtitle = ImageFont.truetype("/System/Library/Fonts/Helvetica.ttc", 14)
              font_instruction = ImageFont.truetype("/System/Library/Fonts/Helvetica.ttc", 18)
          except:
              font_title = ImageFont.load_default()
              font_subtitle = font_title
              font_instruction = font_title

          title = "PNut-TS"
          title_color = (128, 0, 0)
          bbox = draw.textbbox((0, 0), title, font=font_title)
          x = (width - (bbox[2] - bbox[0])) // 2
          draw.text((x, 25), title, fill=title_color, font=font_title)

          subtitle = "Propeller 2 Spin2/PASM2 Compiler"
          bbox = draw.textbbox((0, 0), subtitle, font=font_subtitle)
          x = (width - (bbox[2] - bbox[0])) // 2
          draw.text((x, 58), subtitle, fill=(80, 80, 80), font=font_subtitle)

          arrow_y, arrow_left, arrow_right = 150, 200, 290
          arrow_color = (128, 0, 0)
          draw.rectangle([(arrow_left, arrow_y - 2), (arrow_right - 12, arrow_y + 2)], fill=arrow_color)
          draw.polygon([(arrow_right, arrow_y), (arrow_right - 12, arrow_y - 12), (arrow_right - 12, arrow_y + 12)], fill=arrow_color)

          instruction = "Drag to Applications Folder to Install"
          bbox = draw.textbbox((0, 0), instruction, font=font_instruction)
          x = (width - (bbox[2] - bbox[0])) // 2
          draw.text((x, 255), instruction, fill=(80, 80, 80), font=font_instruction)

          logo_path = "REF-INSTALL/Images/SteveFinalLogoV5-m-200x269.png"
          if os.path.exists(logo_path):
              try:
                  logo = Image.open(logo_path).convert("RGBA")
                  logo_h = 45
                  scale = logo_h / logo.size[1]
                  logo = logo.resize((int(logo.size[0] * scale), logo_h), Image.LANCZOS)
                  x = width - logo.size[0] - 20
                  img.paste(logo, (x, 25), logo)
              except:
                  pass

          img.save('dmg-background.png')
          print("Created dmg-background.png (500x300)")
          PYTHON_SCRIPT
          python3 create_dmg_bg.py
          rm -f create_dmg_bg.py

      - name: Create DMGs
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Define AppleScript for DMG styling (heredoc must be at base indent level)
          cat > /tmp/dmg-style.scpt << 'APPLESCRIPT'
          tell application "Finder"
            tell disk "PNut-TS"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {400, 100, 900, 400}
              set theViewOptions to the icon view options of container window
              set arrangement of theViewOptions to not arranged
              set icon size of theViewOptions to 72
              set background picture of theViewOptions to file ".background:background.png"
              set position of item "pnut_ts" of container window to {125, 150}
              set position of item "Applications" of container window to {375, 150}
              close
              open
              update without registering applications
              delay 2
              close
            end tell
          end tell
          APPLESCRIPT

          for arch in x64 arm64; do
            PKG_DIR="packages/pnut-ts-macos-${arch}-${VERSION}"
            DMG_NAME="pnut-ts-macos-${arch}-${VERSION}.dmg"

            if [ -d "$PKG_DIR" ]; then
              echo "Creating DMG for ${arch}..."

              # Create staging directory
              STAGING="dmg-staging-${arch}"
              rm -rf "$STAGING"
              mkdir -p "$STAGING"

              # Copy pnut_ts folder
              cp -r "$PKG_DIR/pnut_ts" "$STAGING/"

              # Set folder icon if app-icon.icns exists
              if [ -f "app-icon.icns" ]; then
                echo "Setting folder icon..."
                # Convert icns to png for folder icon
                sips -s format png app-icon.icns --out /tmp/folder-icon.png >/dev/null 2>&1 || true

                # Apply rounded corners using Python
                python3 -c "
          from PIL import Image, ImageDraw
          img = Image.open('/tmp/folder-icon.png').convert('RGBA')
          size = img.size[0]
          radius = int(size * 0.22)
          mask = Image.new('L', (size, size), 0)
          draw = ImageDraw.Draw(mask)
          draw.rounded_rectangle([(0, 0), (size-1, size-1)], radius=radius, fill=255)
          result = Image.new('RGBA', (size, size), (0, 0, 0, 0))
          result.paste(img, (0, 0), mask)
          result.save('/tmp/folder-icon-rounded.png', 'PNG')
          "
                # Use NSWorkspace to set folder icon
                osascript -e 'use framework "Cocoa"' \
                  -e "set iconPath to POSIX file \"/tmp/folder-icon-rounded.png\"" \
                  -e "set folderPath to POSIX file \"$PWD/$STAGING/pnut_ts\"" \
                  -e "set iconImage to current application's NSImage's alloc()'s initWithContentsOfFile:(POSIX path of iconPath)" \
                  -e "current application's NSWorkspace's sharedWorkspace()'s setIcon:iconImage forFile:(POSIX path of folderPath) options:0"
                rm -f /tmp/folder-icon.png /tmp/folder-icon-rounded.png
              fi

              # Create Applications symlink
              ln -s /Applications "$STAGING/Applications"

              # Copy background if exists
              if [ -f "dmg-background.png" ]; then
                mkdir -p "$STAGING/.background"
                cp dmg-background.png "$STAGING/.background/background.png"
              fi

              # Copy volume icon if exists
              if [ -f "volume-icon.icns" ]; then
                cp volume-icon.icns "$STAGING/.VolumeIcon.icns"
              fi

              # Calculate DMG size
              FOLDER_SIZE_KB=$(du -sk "$STAGING" | cut -f1)
              DMG_SIZE=$(( (FOLDER_SIZE_KB / 1024) + 20 ))

              # Create temporary read-write DMG with HFS+ (required for custom icons)
              echo "Building DMG (${DMG_SIZE}MB)..."
              hdiutil create -volname "PNut-TS" \
                -srcfolder "$STAGING" \
                -fs HFS+ \
                -ov -format UDRW \
                -size ${DMG_SIZE}m \
                "temp-$DMG_NAME"

              # Mount and customize
              MOUNT_OUTPUT=$(hdiutil attach -readwrite -noverify -noautoopen "temp-$DMG_NAME" 2>&1)
              DEVICE=$(echo "$MOUNT_OUTPUT" | egrep '^/dev/' | sed 1q | awk '{print $1}')
              sleep 2

              # Apply window styling with AppleScript FIRST (before setting volume icon)
              echo "Applying window styling..."
              osascript /tmp/dmg-style.scpt || true
              sleep 1

              # Set volume icon AFTER AppleScript (AppleScript can delete it)
              if [ -f "volume-icon.icns" ]; then
                echo "Setting volume icon..."
                cp volume-icon.icns "/Volumes/PNut-TS/.VolumeIcon.icns"
                SetFile -c icnC "/Volumes/PNut-TS/.VolumeIcon.icns" 2>/dev/null || true
                SetFile -a C "/Volumes/PNut-TS" 2>/dev/null || true
              fi

              sync
              sleep 2

              # Unmount with retry loop (disk can be busy)
              echo "Unmounting disk..."
              DETACH_ATTEMPTS=0
              MAX_DETACH_ATTEMPTS=5
              while [ $DETACH_ATTEMPTS -lt $MAX_DETACH_ATTEMPTS ]; do
                if hdiutil detach "${DEVICE}" 2>/dev/null; then
                  echo "Disk unmounted successfully"
                  break
                fi
                DETACH_ATTEMPTS=$((DETACH_ATTEMPTS + 1))
                echo "Unmount attempt $DETACH_ATTEMPTS failed, waiting..."
                sleep 3
              done

              # Force unmount if still mounted
              if [ $DETACH_ATTEMPTS -eq $MAX_DETACH_ATTEMPTS ]; then
                echo "Force unmounting..."
                hdiutil detach "${DEVICE}" -force || true
                sleep 2
              fi

              # Extra delay to ensure disk is fully released
              sleep 3

              # Convert to compressed read-only
              echo "Compressing DMG..."
              hdiutil convert "temp-$DMG_NAME" -format UDZO -imagekey zlib-level=9 -o "$DMG_NAME"
              rm -f "temp-$DMG_NAME"

              echo "Created: $DMG_NAME"
              rm -rf "$STAGING"
            fi
          done

          # Cleanup temp AppleScript
          rm -f /tmp/dmg-style.scpt

      - name: Sign DMGs
        if: env.SIGNING_ENABLED == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVELOPER_NAME: ${{ secrets.APPLE_DEVELOPER_NAME }}
        run: |
          for dmg in pnut-ts-macos-*.dmg; do
            if [ -f "$dmg" ]; then
              echo "Signing DMG: $dmg"
              codesign --force --sign "Developer ID Application: ${APPLE_DEVELOPER_NAME} (${APPLE_TEAM_ID})" \
                --options runtime \
                --timestamp \
                "$dmg"
              codesign --verify --verbose=2 "$dmg"
            fi
          done

      - name: Notarize DMGs
        if: env.SIGNING_ENABLED == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for dmg in pnut-ts-macos-*.dmg; do
            if [ -f "$dmg" ]; then
              echo "Notarizing: $dmg"

              xcrun notarytool submit "$dmg" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_ID_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                --wait

              echo "Stapling notarization ticket..."
              xcrun stapler staple "$dmg"

              echo "Validating..."
              xcrun stapler validate "$dmg"

              echo "$dmg notarized and stapled successfully"
            fi
          done

      - name: Create macOS ZIP packages (containing signed/notarized DMGs)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          for arch in x64 arm64; do
            DMG_FILE="pnut-ts-macos-${arch}-${VERSION}.dmg"
            ZIP_FILE="pnut-ts-macos-${arch}-${VERSION}.zip"
            if [ -f "$DMG_FILE" ]; then
              echo "Creating ZIP containing DMG for macOS ${arch}..."
              zip "$ZIP_FILE" "$DMG_FILE"
              echo "Created: $ZIP_FILE (containing $DMG_FILE)"
            else
              echo "WARNING: DMG not found: $DMG_FILE"
            fi
          done

      - name: Upload macOS ZIPs
        uses: actions/upload-artifact@v4
        with:
          name: packages-macos-zip
          path: pnut-ts-macos-*.zip
          retention-days: 5

  # Create GitHub Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, macos-sign]
    if: ${{ !inputs.dry_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ZIP packages
        uses: actions/download-artifact@v4
        with:
          name: packages-zip
          path: release/

      - name: Download macOS ZIP packages
        uses: actions/download-artifact@v4
        with:
          name: packages-macos-zip
          path: release/

      - name: Download version info
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: .

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: List release artifacts
        run: |
          echo "Release artifacts:"
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          echo ""
          echo "Checksums:"
          cat checksums.txt

      - name: Determine release type
        id: release_type
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "RELEASE_NAME=PNut-TS v${TAG_VERSION} (Test Release)" >> $GITHUB_OUTPUT
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
            echo "RELEASE_NAME=PNut-TS v${TAG_VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Generate release body
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${{ github.ref_name }}"

          # Extract changelog section for this version
          CHANGELOG_CONTENT=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md | sed '/^$/N;/^\n$/d')

          # Extract one-line summary (first Added or Fixed bullet point)
          SUMMARY_LINE=$(echo "${CHANGELOG_CONTENT}" | grep -m1 '^\- ' | sed 's/^- //' | sed 's/\*\*[^*]*\*\*: //')

          # Generate release body file
          cat > release_body.md << RELEASE_EOF
          ## PNut-TS ${TAG}

          Propeller 2 Spin2/PASM2 Compiler - TypeScript Implementation

          **This release:** ${SUMMARY_LINE:-Bug fixes and improvements}

          ---

          ### What's New in This Release

          ${CHANGELOG_CONTENT}

          See [CHANGELOG.md](https://github.com/ironsheep/PNut-TS/blob/main/CHANGELOG.md) for complete history.

          ---

          ### Downloads

          | Platform | Architecture | Download |
          |----------|--------------|----------|
          | **macOS** | Apple Silicon (M1 and later) | \`pnut-ts-macos-arm64-${VERSION}.zip\` |
          | **macOS** | Intel x64 | \`pnut-ts-macos-x64-${VERSION}.zip\` |
          | **Windows** | x64 | \`pnut-ts-win-x64-${VERSION}.zip\` |
          | **Windows** | ARM64 | \`pnut-ts-win-arm64-${VERSION}.zip\` |
          | **Linux** | x64 | \`pnut-ts-linux-x64-${VERSION}.zip\` |
          | **Linux** | ARM64 | \`pnut-ts-linux-arm64-${VERSION}.zip\` |

          ---

          ### Installing

          Installation varies by operating system. Recommendations for installation of a version / or Update to the latest version can be found at the following pages:

          - [Install/Update RPi/Linux](https://github.com/ironsheep/P2-vscode-langserv-extension/blob/main/TASKS-User-RPi.md#installing-pnut-ts-on-rpilinux)
          - [Install/Update macOS](https://github.com/ironsheep/P2-vscode-langserv-extension/blob/main/TASKS-User-macOS.md#installing-pnut-ts-on-macos)
          - [Install/Update Windows](https://github.com/ironsheep/P2-vscode-langserv-extension/blob/main/TASKS-User-win.md#installing-pnut-ts-on-windows)

          ---

          ### Checksums

          See \`checksums.txt\` for SHA256 checksums of all files.
          RELEASE_EOF

          echo "Generated release body:"
          cat release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ steps.release_type.outputs.RELEASE_NAME }}
          draft: false
          prerelease: ${{ steps.release_type.outputs.IS_PRERELEASE == 'true' }}
          files: |
            release/*
          body_path: release_body.md
